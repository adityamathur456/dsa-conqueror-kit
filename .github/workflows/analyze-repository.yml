name: Repository Statistics

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  repository-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Analyze Repository
        shell: bash
        run: |
          ROOT="Data Structures & Algorithms"

          if [ ! -d "$ROOT" ]; then
            echo "::error::Directory '$ROOT' not found."
            exit 1
          fi

          problems=0
          java_files=0
          empty_folders=0
          failed=0

          declare -A seen
          declare -a topic_names

          for dir in "$ROOT"/*; do
            [ -d "$dir" ] || continue

            problems=$((problems + 1))

            folder=$(basename "$dir")
            topic_names+=("$folder")

            # Duplicate folder detection
            if [[ -n "${seen[$folder]}" ]]; then
              echo "::error::Duplicate folder detected: $folder"
              failed=1
            fi
            seen[$folder]=1

            # Count Java files
            count=$(find "$dir" -maxdepth 1 -type f -name "*.java" | wc -l)
            java_files=$((java_files + count))

            # Empty folder detection
            files=$(find "$dir" -maxdepth 1 -type f | wc -l)
            if [ "$files" -eq 0 ]; then
              empty_folders=$((empty_folders + 1))
              echo "::warning::Empty folder: $folder"
            fi
          done

          topics=${#topic_names[@]}

          echo ""
          echo "========================================"
          echo "Repository Statistics"
          echo "========================================"
          printf "Problems Solved : %d\n" "$problems"
          printf "Java Files      : %d\n" "$java_files"
          printf "Topics          : %d\n" "$topics"
          printf "Empty Folders   : %d\n" "$empty_folders"

          echo ""
          echo "Topics List"
          echo "-----------"

          for topic in "${topic_names[@]}"; do
            echo "• $topic"
          done

          echo ""
          echo "Status"

          if [ "$failed" -eq 0 ] && [ "$empty_folders" -eq 0 ]; then
            echo "✅ Repository Healthy"
          else
            echo "❌ Repository Needs Attention"
            exit 1
          fi
